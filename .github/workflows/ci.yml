name: CoreSuite Acceptance Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome (non-snap)
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: stable

      - name: Verify Chrome binary
        run: |
          echo "Chrome: ${{ steps.setup-chrome.outputs.chrome-path }}"
          ${{ steps.setup-chrome.outputs.chrome-path }} --version

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run acceptance tests
        run: |
          mvn verify \
            -Dheadless=true \
            -Dchromium.binary="${{ steps.setup-chrome.outputs.chrome-path }}" \
            -Dmock.server.port=8090 \
            --no-transfer-progress

      - name: Prepare Pages content
        if: always()
        run: |
          mkdir -p gh-pages-content
          if [ -d "cucumber-report/cucumber-html-reports" ]; then
            cp -r cucumber-report/cucumber-html-reports/. gh-pages-content/
          fi
          cat > gh-pages-content/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8"/>
            <meta http-equiv="refresh" content="0;url=overview-features.html"/>
            <title>CoreSuite Test Report</title>
          </head>
          <body><p>Redirecting to <a href="overview-features.html">test report</a>…</p></body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-content
          publish_branch: gh-pages
          force_orphan: true

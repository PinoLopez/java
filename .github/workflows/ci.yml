name: CoreSuite Acceptance Tests (Production Ready)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome (non-snap)
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: stable

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Start mock server (Bitbucket-style)
        run: |
          cd mock-app
          nohup python3 -m http.server 8090 --bind 127.0.0.1 > /tmp/mock-server.log 2>&1 &
          echo $! > /tmp/mock-server.pid
          sleep 4
          curl -sf http://127.0.0.1:8090/index.html || (echo "Mock server failed" && cat /tmp/mock-server.log && exit 1)

      - name: Run full test suite
        run: |
          mvn clean verify \
            -Dheadless=true \
            -Dchromium.binary="${{ steps.setup-chrome.outputs.chrome-path }}" \
            -DbaseUrl=http://127.0.0.1:8090 \
            -Dmock.server.port=8090 \
            -Dskip.mock.server=true \
            --no-transfer-progress

      - name: Stop mock server
        if: always()
        run: pkill -f "http.server 8090" || true

      - name: Prepare report for GitHub Pages
        if: always()
        run: |
          mkdir -p gh-pages-content
          if [ -d "cucumber-report/cucumber-html-reports" ]; then
            cp -r cucumber-report/cucumber-html-reports/. gh-pages-content/
            echo "Report copied successfully"
          fi
          cp -r mock-app gh-pages-content/mock-app
          cat > gh-pages-content/index.html << 'HTML'
          <!DOCTYPE html>
          <html><head><meta charset="UTF-8"><meta http-equiv="refresh" content="0;url=overview-features.html"></head>
          <body><p>Redirecting to CoreSuite Test Report...</p></body></html>
          HTML

      - name: Deploy report to GitHub Pages (like Bitbucket artifact)
        if: github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-content
          publish_branch: gh-pages
          force_orphan: true

      - name: Upload full report as artifact (Bitbucket-style)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-report
          path: cucumber-report/cucumber-html-reports/
          retention-days: 30

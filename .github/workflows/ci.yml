name: CoreSuite Acceptance Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome (non-snap)
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: stable

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Start mock server
        run: |
          cd mock-app
          nohup python3 -m http.server 8090 --bind 127.0.0.1 \
            > /tmp/mock-server.log 2>&1 &
          echo $! > /tmp/mock-server.pid
          sleep 3
          curl -sf http://127.0.0.1:8090/index.html > /dev/null \
            && echo "Mock server OK" \
            || (echo "Mock server failed:" && cat /tmp/mock-server.log && exit 1)

      - name: Run tests and generate report
        run: |
          mvn verify \
            -Dheadless=true \
            -Dchromium.binary="${{ steps.setup-chrome.outputs.chrome-path }}" \
            -Dmock.server.port=8090 \
            --no-transfer-progress

      - name: Stop mock server
        if: always()
        run: kill $(cat /tmp/mock-server.pid) 2>/dev/null || true

      - name: Show report files generated
        if: always()
        run: |
          echo "=== cucumber-json ===" 
          ls target/cucumber-json/ 2>/dev/null || echo "no json"
          echo "=== cucumber-report ==="
          ls cucumber-report/ 2>/dev/null || echo "no report dir"
          echo "=== cucumber-html-reports ==="
          ls cucumber-report/cucumber-html-reports/ 2>/dev/null || echo "no html reports"

      - name: Prepare Pages content
        if: always()
        run: |
          mkdir -p gh-pages-content
          if [ -d "cucumber-report/cucumber-html-reports" ]; then
            cp -r cucumber-report/cucumber-html-reports/. gh-pages-content/
            echo "Report files copied:"
            ls gh-pages-content/
          else
            echo "WARNING: no report found"
          fi
          cat > gh-pages-content/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8"/>
            <meta http-equiv="refresh" content="0;url=overview-features.html"/>
            <title>CoreSuite Test Report</title>
          </head>
          <body><p>Redirecting to <a href="overview-features.html">test report</a>…</p></body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-content
          publish_branch: gh-pages
          force_orphan: true
